name: Deploy to S3

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (static export)
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # Pushing the backend APIs to Lambda
      # Note that the root lambda directory is hardcoded
      - name: Build Lambda Zips
        run: |
          set -e
          find api -type f \( -name "GET.js" -o -name "POST.js" -o -name "PUT.js" -o -name "DELETE.js" -o -name "PATCH.js" \) -print0 |
          while IFS= read -r -d '' handler; do
            handler_dir=$(dirname "$handler")

            # skip anything under api/shared
            case "$handler_dir" in
              api/shared*) continue ;;
            esac

            echo "Building: $handler_dir"
            build_dir=$(mktemp -d)

            # only copy files directly in this folder - NOT subdirectories,
            # since a parent route folder (e.g. politicians/[people_id]/) can
            # contain nested route folders (votes/, finance/, etc.) that are
            # separate Lambdas and must not be bundled into this one
            find "$handler_dir" -maxdepth 1 -type f ! -name "function.zip" -exec cp {} "$build_dir/" \;

            (
              cd "$build_dir"
              [ -f package.json ] || npm init -y > /dev/null 2>&1
              npm install pg --silent
              zip -r function.zip . -x "function.zip" > /dev/null
            )

            cp "$build_dir/function.zip" "$handler_dir/function.zip"
            rm -rf "$build_dir"
          done

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform apply
        working-directory: iac
        env:
          TF_VAR_pg_host: ${{ secrets.PGHOST }}
          TF_VAR_pg_database: ${{ secrets.PGDATABASE }}
          TF_VAR_pg_user: ${{ secrets.PGUSER }}
          TF_VAR_pg_password: ${{ secrets.PGPASSWORD }}
        run: |
          terraform init
          terraform apply -auto-approve

      # Update frontend static files for serving
      - name: Sync to S3
        run: aws s3 sync ./out s3://${{ secrets.S3_BUCKET }} --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
