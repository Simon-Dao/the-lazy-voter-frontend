name: Deploy to S3

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (static export)
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
        
      # Pushing the backend APIs to Lambda
      # Note that the root lambda directory is hardcoded
      - name: Build Lambda Zips
        run: |
          for dir in api/*/; do
            name=$(basename "$dir")
            [ "$name" == "shared" ] && continue
            find "$dir" -name "GET.js" -o -name "POST.js" -o -name "PUT.js" -o -name "DELETE.js" | while read -r handler; do
              handler_dir=$(dirname "$handler")
              cd "$handler_dir"
              [ -f package.json ] && npm ci --production
              zip -r function.zip . -x "function.zip"
              cd - > /dev/null
            done
          done
          
      - name: Terraform init and apply
        working-directory: iac
        run: |
          terraform init
          terraform apply -auto-approve
      
      # Update frontend static files for serving
      - name: Sync to S3
        run: aws s3 sync ./out s3://${{ secrets.S3_BUCKET }} --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"