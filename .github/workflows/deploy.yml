name: Deploy to S3

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (static export)
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
        
      # Pushing the backend APIs to Lambda
      # Note that the root lambda directory is hardcoded
      - name: Build Lambda Zips
        run: |
          set -x
          for dir in api/*/; do
            name=$(basename "$dir")
            [ "$name" == "shared" ] && continue

            for handler in "$dir"*.js "$dir"*/*.js; do
              [ -f "$handler" ] || continue
              case "$(basename "$handler")" in
                GET.js|POST.js|PUT.js|DELETE.js) ;;
                *) continue ;;
              esac

              handler_dir=$(dirname "$handler")
              echo "Building: $handler_dir"
              cd "$handler_dir"
              npm init -y > /dev/null 2>&1 || true
              npm install pg --silent
              zip -r function.zip . -x "function.zip"
              cd "$GITHUB_WORKSPACE"
            done
          done
      
      - name: Setup Terraform          
        uses: hashicorp/setup-terraform@v3

      - name: Terraform
        working-directory: iac
        run: |
          terraform init

      - name: Terraform apply
        working-directory: iac
        env:
          TF_VAR_pghost: ${{ secrets.PGHOST }}
          TF_VAR_pgdatabase: ${{ secrets.PGDATABASE }}
          TF_VAR_pguser: ${{ secrets.PGUSER }}
          TF_VAR_pgpassword: ${{ secrets.PGPASSWORD }}
        run: |
          terraform init
          terraform apply -auto-approve
                

      # Update frontend static files for serving
      - name: Sync to S3
        run: aws s3 sync ./out s3://${{ secrets.S3_BUCKET }} --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"